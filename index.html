<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lion School SENAI</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <img src="./img/logo.png" alt="Logo Lion School">
        <div class="sair">
            <img src="./img/sair.png" alt="Sair">
            <span>Sair</span>
        </div>
    </header>
    <main>
        <div class="hero">
            <div class="hero-left">
                <p>Escolha um <span>curso</span> para gerenciar</p>
                <img class="devices" src="./img/devices.png" alt="Dispositivos (da esquerda para a direita: celular, tablet, computador)">
            </div>
            <div class="hero-center">
                <img src="./img/student.png" alt="Estudante feminina">
            </div>
            <div class="hero-right">
                <button>
                    <img src="./img/code.png" alt="">
                    DS
                </button>
                <button>
                    <img src="./img/redes.png" alt="">
                    REDES
                </button>
            </div>
        </div>
    </main>
    <footer>
        <div class="frame">
            <div class="info">
                <div class="icons">
                    <img src="./img/phone.png" alt="Ícone de telefone">
                    <img src="./img/email.png" alt="Ícone de email">
                    <img src="./img/local.png" alt="Ícone de local">
                </div>
                <div class="data">
                    <span class="phone">(11) 4774-4700</span>
                    <span class="email">lionschool@gmail.com</span>
                    <span class="local">Rua TCC, 211, Centro, Jandira</span>
                </div>
            </div>
            <div class="copyright">
                <span>Copyright © 2026 | Fernando Leonid</span>
            </div>
            <div class="social-media">
                <div class="border">
                    <img src="./img/youtube.png" alt="Ícone do YouTube">
                </div>
                <div class="border">
                    <img src="./img/twitter.png" alt="Ícone do Twitter">
                </div>
                <div class="border">
                    <img src="./img/instagram.png" alt="Ícone do Instagram">
                </div>
                <div class="border">
                    <img src="./img/facebook.png" alt="Ícone do Facebook">
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
